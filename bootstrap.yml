- name: Download and apply boostrap manifests
  hosts: control_plane[0]
  any_errors_fatal: true

  tasks:
    - name: Ensure Git is installed
      ansible.builtin.apt:
        name:
          - git
        state: present

    - name: Clone bootstrap repository
      ansible.builtin.git:
        repo: {{ bootstrap.repo }}
        version: {{ bootstrap.version }}
        dest: /tmp/bootstrap
        force: true

    - name: Apply the Kustomization
      ansible.builtin.command: kubectl apply --server-side --force-conflicts -k /tmp/bootstrap